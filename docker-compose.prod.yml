# Production-Safe Docker Compose Configuration
# Uses named volumes for data persistence and safety

services:
  # PostgreSQL Primary with persistent named volume
  postgres-primary:
    image: postgres:15-alpine
    container_name: twitter-postgres-primary-prod
    environment:
      POSTGRES_DB: twitter
      POSTGRES_USER: twitter_user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      # Named volume for data persistence
      - postgres_primary_data:/var/lib/postgresql/data
      # Initialization scripts (optional)
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitter_user -d twitter"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Replica with persistent named volume
  postgres-replica:
    image: postgres:15-alpine
    container_name: twitter-postgres-replica-prod
    environment:
      POSTGRES_DB: twitter
      POSTGRES_USER: twitter_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      # Named volume for replica data
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - twitter-network
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Waiting for primary to be ready...'
      while ! pg_isready -h postgres-primary -U twitter_user; do
        sleep 2
      done
      echo 'Setting up replication...'
      "

  # Elasticsearch with persistent data
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: twitter-elasticsearch-prod
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis with persistent data
  redis:
    image: redis:7-alpine
    container_name: twitter-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Kafka with persistent data
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: twitter-kafka-prod
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    networks:
      - twitter-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: twitter-zookeeper-prod
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - twitter-network
    restart: unless-stopped

  # Microservices
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: twitter-auth-service-prod
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_NAME: twitter
      DB_USER: twitter_user
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      SERVICE_NAME: auth-service
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: twitter-user-service-prod
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_NAME: twitter
      DB_USER: twitter_user
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: user-service
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  feed-service:
    build:
      context: ./backend
      dockerfile: feed-service/Dockerfile
    container_name: twitter-feed-service-prod
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_NAME: twitter
      DB_USER: twitter_user
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: feed-service
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  search-service:
    build:
      context: ./backend
      dockerfile: search-service/Dockerfile
    container_name: twitter-search-service-prod
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_NAME: twitter
      DB_USER: twitter_user
      DB_PASSWORD: ${DB_PASSWORD:-password}
      KAFKA_BROKERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: search-service
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: twitter-notification-service-prod
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: notification-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: twitter-api-gateway-prod
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: api-gateway
      AUTH_SERVICE_URL: http://auth-service:3002
      USER_SERVICE_URL: http://user-service:3003
      FEED_SERVICE_URL: http://feed-service:3004
      SEARCH_SERVICE_URL: http://search-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TWEET_RATE_LIMIT_MAX: ${TWEET_RATE_LIMIT_MAX:-10}
      TWEET_RATE_LIMIT_WINDOW: ${TWEET_RATE_LIMIT_WINDOW:-3600000}
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      feed-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: twitter-frontend-prod
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - twitter-network
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  postgres_primary_data:
    driver: local
    labels:
      service: postgres-primary
      environment: production-safe
      backup: required

  postgres_replica_data:
    driver: local
    labels:
      service: postgres-replica
      environment: production-safe
      backup: required

  elasticsearch_data:
    driver: local
    labels:
      service: elasticsearch
      environment: production-safe
      backup: required

  redis_data:
    driver: local
    labels:
      service: redis
      environment: production-safe
      backup: optional

  kafka_data:
    driver: local
    labels:
      service: kafka
      environment: production-safe
      backup: optional

  zookeeper_data:
    driver: local
    labels:
      service: zookeeper
      environment: production-safe
      backup: optional

  zookeeper_logs:
    driver: local
    labels:
      service: zookeeper
      environment: production-safe
      backup: optional

# Networks
networks:
  twitter-network:
    driver: bridge
    labels:
      project: twitter-clone
      environment: production-safe