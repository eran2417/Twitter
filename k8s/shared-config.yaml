apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
data:
  NODE_ENV: "production"
  DB_PRIMARY_HOST: "postgres-primary"
  DB_PRIMARY_PORT: "5432"
  DB_REPLICA_HOST: "postgres-replica"
  DB_REPLICA_PORT: "5432"
  DB_NAME: "twitter"
  DB_USER: "twitter_user"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  CACHE_TTL: "300"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_CLIENT_ID: "twitter-backend"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  FRONTEND_URL: "http://localhost:3000"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-secrets
type: Opaque
stringData:
  DB_PASSWORD: "password"
  JWT_SECRET: "changeme-minimum-32-chars-long"
